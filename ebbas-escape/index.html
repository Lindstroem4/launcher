<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07131e">
<title>Ebbas Escape</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07131e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
#hud{position:fixed;top:max(8px,env(safe-area-inset-top));left:10px;right:10px;z-index:3;display:flex;justify-content:space-between;pointer-events:none}
.box{background:rgba(5,12,20,.72);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:9px 12px;font-weight:800;backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,.25)}
#danger{position:fixed;left:50%;top:max(9px,env(safe-area-inset-top));transform:translateX(-50%);width:min(340px,45vw);height:10px;border-radius:99px;background:rgba(0,0,0,.35);overflow:hidden;z-index:4;border:1px solid rgba(255,255,255,.13)}
#dangerFill{height:100%;width:20%;background:linear-gradient(90deg,#49e27d,#ffd94d,#ff5a4f);border-radius:inherit;transition:width .1s linear}
#controls{position:fixed;z-index:5;left:14px;right:14px;bottom:max(12px,env(safe-area-inset-bottom));display:flex;justify-content:space-between}
.group{display:flex;gap:10px}
button{-webkit-appearance:none;appearance:none}
.ctrl{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.28);background:linear-gradient(145deg,rgba(255,255,255,.20),rgba(255,255,255,.08));color:#fff;font-size:28px;font-weight:900;box-shadow:0 10px 24px rgba(0,0,0,.34),inset 0 1px rgba(255,255,255,.25)}
.ctrl.on,.ctrl:active{transform:scale(.93);background:rgba(255,255,255,.28)}
#jump{width:86px;height:86px;background:linear-gradient(145deg,rgba(255,210,74,.33),rgba(255,139,50,.17))}
#overlay{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at 50% 30%,rgba(16,42,64,.55),rgba(3,9,15,.88))}
.card{width:min(530px,88vw);background:linear-gradient(180deg,rgba(13,29,43,.97),rgba(5,15,24,.97));color:#fff;border:1px solid rgba(255,255,255,.19);border-radius:28px;padding:26px;text-align:center;box-shadow:0 28px 90px rgba(0,0,0,.52)}
h1{font-size:36px;margin:0 0 12px;letter-spacing:-.03em} p{font-size:18px;line-height:1.42;color:#dbe8f5}
.start{display:block;width:100%;border:0;border-radius:18px;background:linear-gradient(135deg,#ffd35a,#ff9144);color:#241400;font-size:21px;font-weight:950;padding:17px 14px;margin-top:18px;box-shadow:0 12px 28px rgba(255,145,68,.28)}
.note{font-size:13px;opacity:.76;margin-top:12px}
@media (orientation:portrait){.card{transform:scale(.94)}#danger{width:36vw}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div class="box">EBBAS ESCAPE<br><span style="font-size:12px;font-weight:600">Nå fjällportalen</span></div>
  <div class="box" id="stats">⭐ 0 / 10<br>0 m</div>
</div>
<div id="danger"><div id="dangerFill"></div></div>
<div id="controls">
  <div class="group"><button class="ctrl" id="left">◀</button><button class="ctrl" id="right">▶</button></div>
  <button class="ctrl" id="jump">↑</button>
</div>
<div id="overlay"><div class="card">
  <h1>Ebbas Escape</h1>
  <p>Spring genom fjällvärlden, dubbelhoppa över raviner och håll mannen bakom dig i bild hela vägen.</p>
  <button class="start" id="start">STARTA SPELET</button>
  <div class="note">Bäst i liggande läge · musik och ljudeffekter startar vid första trycket</div>
</div></div>
<script>
(function(){
"use strict";
var canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1),ground=0;
function resize(){W=innerWidth;H=innerHeight;canvas.width=W*DPR;canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);ground=H*.80}
addEventListener("resize",resize);resize();

var girlImg=new Image(),manImg=new Image();
girlImg.src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANwAAAEYCAYAAAAwYpLPAAEAAElEQVR42uy9B7Al13Ue+H3f1z1OXy/3eX8tC0g4lqJkWRQd8mI5mS5tZ1Vb2bSx1aR6bS2Kx6V1x7a...";manImg.src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAANwAAAEiCAYAAAC0N1gUAAEAAElEQVR42uy9B7Al13Ue+H3f1z1OXy/3eX8tC0g4lqJkWRQd8mI5mS5tZ1Vb2bSx1aR6bS2Kx6V1x7a...";
var keys={left:false,right:false,jump:false},running=false,player,chaser,camera=0,stars=0,last=Date.now(),jumpLock=false,shake=0,particles=[];
var plats=[[0,700,0],[790,270,65],[1120,240,130],[1470,300,48],[1890,260,115],[2270,240,175],[2640,360,68],[3140,270,138],[3520,220,198],[3860,430,80],[4420,240,150],[4750,310,210],[5200,400,68],[5720,250,140],[6100,270,205],[6500,430,90],[7060,440,145],[7580,420,20]];
function hAt(x){var h=0;for(var i=0;i<plats.length;i++){var p=plats[i];if(x>=p[0]&&x<=p[0]+p[1]&&p[2]>h)h=p[2]}return h}
var starX=[860,1190,1550,1980,2360,2730,3230,3600,4510,6170],taken=new Array(10).fill(false);
function reset(){player={x:140,y:0,vx:0,vy:0,jumps:0,dir:1,run:0};chaser={x:-180,y:0,vx:3.0,run:0};camera=-120;stars=0;particles=[];for(var i=0;i<taken.length;i++)taken[i]=false;running=true;last=Date.now();jumpLock=false}
function bind(id,key){var el=document.getElementById(id);function on(e){e.preventDefault();keys[key]=true;el.classList.add("on")}function off(e){e.preventDefault();keys[key]=false;el.classList.remove("on")}el.addEventListener("touchstart",on,{passive:false});el.addEventListener("touchend",off,{passive:false});el.addEventListener("pointerdown",on);el.addEventListener("pointerup",off);el.addEventListener("pointercancel",off)}
bind("left","left");bind("right","right");bind("jump","jump");
addEventListener("keydown",function(e){if(e.key==="ArrowLeft"||e.key==="a")keys.left=true;if(e.key==="ArrowRight"||e.key==="d")keys.right=true;if(e.key==="ArrowUp"||e.key===" "||e.key==="w")keys.jump=true});
addEventListener("keyup",function(e){if(e.key==="ArrowLeft"||e.key==="a")keys.left=false;if(e.key==="ArrowRight"||e.key==="d")keys.right=false;if(e.key==="ArrowUp"||e.key===" "||e.key==="w")keys.jump=false});

var ac=null,timer=null,note=0;
function tone(f,t,d,type,v){var o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+d+.03)}
function music(){try{ac=new (AudioContext||webkitAudioContext)();var seq=[262,330,392,523,392,330,294,370,440,587,440,370];timer=setInterval(function(){if(!running)return;var t=ac.currentTime,f=seq[note%seq.length];tone(f,t,.16,"triangle",.035);if(note%2===0)tone(f/4,t,.32,"sawtooth",.015);note++},180)}catch(e){}}
function sfx(f,d){if(!ac)return;try{tone(f,ac.currentTime,d||.08,"square",.04)}catch(e){}}
function startGame(e){if(e)e.preventDefault();document.getElementById("overlay").style.display="none";reset();if(!ac)music()}
document.getElementById("start").addEventListener("click",startGame);
document.getElementById("start").addEventListener("touchend",startGame,{passive:false});

function emit(x,y,color,n){for(var i=0;i<n;i++)particles.push({x:x,y:y,vx:(Math.random()-.5)*5,vy:Math.random()*5+1,life:1,color:color})}
function finish(ok){running=false;setTimeout(function(){var ov=document.getElementById("overlay");ov.style.display="flex";ov.innerHTML='<div class="card"><h1>'+(ok?'Ebba klarade det! 🎉':'Mannen hann ikapp!')+'</h1><p>'+(ok?'Du samlade '+stars+' av 10 stjärnor.':'Håll full fart och använd dubbelhoppet över de högsta avsatserna.')+'</p><button class="start" id="again">SPELA IGEN</button></div>';var a=document.getElementById("again");a.onclick=function(){ov.style.display="none";reset()}},350)}
function update(dt){
 if(!running)return;
 if(keys.left){player.vx=Math.max(-7.2,player.vx-.9*dt);player.dir=-1}else if(keys.right){player.vx=Math.min(7.2,player.vx+.9*dt);player.dir=1}else player.vx*=Math.pow(.78,dt);
 if(keys.jump&&!jumpLock&&player.jumps<2){player.vy=player.jumps===0?14.4:12.2;player.jumps++;emit(player.x,player.y+8,"#d8f1ff",8);sfx(480)}
 jumpLock=keys.jump;
 player.vy-=.76*dt;player.x+=player.vx*dt;player.y+=player.vy*dt;player.run+=Math.abs(player.vx)*.16*dt;
 player.x=Math.max(20,Math.min(7750,player.x));var floor=hAt(player.x);
 if(player.y<=floor){if(player.vy<0&&player.y<floor+8)emit(player.x,floor+3,"#d9c7a0",5);player.y=floor;player.vy=0;player.jumps=0}
 chaser.vx=3.2+Math.min(1.25,player.x/5800);chaser.x+=chaser.vx*dt;chaser.y=hAt(chaser.x);chaser.run+=chaser.vx*.14*dt;
 if(chaser.x>player.x-38)finish(false);
 for(var i=0;i<starX.length;i++)if(!taken[i]&&Math.abs(player.x-starX[i])<46&&Math.abs(player.y-(hAt(starX[i])+72))<78){taken[i]=true;stars++;emit(starX[i],hAt(starX[i])+72,"#ffd84a",18);sfx(880);shake=6}
 if(player.x>7640)finish(true);
 var leftFocus=Math.min(chaser.x-100,player.x-W*.22),rightFocus=player.x-W*.68;
 var target=Math.max(-180,Math.min(leftFocus,rightFocus));
 camera+=(target-camera)*.075*dt;
 if(chaser.x-camera<70)camera=chaser.x-70;
 if(player.x-camera>W-100)camera=player.x-(W-100);
 shake*=.82;
 for(var j=particles.length-1;j>=0;j--){var p=particles[j];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy-=.28*dt;p.life-=.035*dt;if(p.life<=0)particles.splice(j,1)}
 var gap=player.x-chaser.x, danger=Math.max(0,Math.min(1,1-gap/520));
 document.getElementById("dangerFill").style.width=(15+danger*85)+"%";
 document.getElementById("stats").innerHTML="⭐ "+stars+" / 10<br>"+Math.floor(player.x/10)+" m";
}

function capsule(x1,y1,x2,y2,r,c1,c2){var dx=x2-x1,dy=y2-y1,L=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx);ctx.save();ctx.translate(x1,y1);ctx.rotate(a);var g=ctx.createLinearGradient(0,-r,0,r);g.addColorStop(0,c1);g.addColorStop(.55,c2);g.addColorStop(1,"rgba(0,0,0,.32)");ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(0,-r,L,r*2,r);ctx.fill();ctx.restore()}
function face(im,x,y,w,h){if(im.complete&&im.naturalWidth)ctx.drawImage(im,x,y,w,h)}
function body(o,isGirl){
 var sx=o.x-camera,sy=ground-o.y,bob=Math.sin(o.run)*2,air=o.y>hAt(o.x)+2,phase=o.run;
 ctx.save();ctx.translate(sx,sy+bob);if((o.dir||1)<0)ctx.scale(-1,1);
 ctx.shadowColor="rgba(0,0,0,.30)";ctx.shadowBlur=12;ctx.shadowOffsetY=7;
 var legSwing=air?0:Math.sin(phase)*14,armSwing=air?8:-Math.sin(phase)*18;
 capsule(-10,-18,-16+legSwing*.35,16,7,isGirl?"#74aee6":"#51422f",isGirl?"#457db9":"#2b241c");
 capsule(10,-18,16-legSwing*.35,16,7,isGirl?"#74aee6":"#51422f",isGirl?"#457db9":"#2b241c");
 ctx.fillStyle="#20252a";ctx.beginPath();ctx.ellipse(-16+legSwing*.35,19,11,5,-.08,0,7);ctx.fill();ctx.beginPath();ctx.ellipse(16-legSwing*.35,19,11,5,.08,0,7);ctx.fill();
 var torso=ctx.createLinearGradient(-24,-80,24,-20);torso.addColorStop(0,isGirl?"#ffffff":"#e1b65c");torso.addColorStop(.5,isGirl?"#d9e8f5":"#bb7e2f");torso.addColorStop(1,isGirl?"#9db8cd":"#71471f");
 ctx.fillStyle=torso;ctx.beginPath();ctx.moveTo(-22,-78);ctx.quadraticCurveTo(-31,-55,-22,-20);ctx.lineTo(22,-20);ctx.quadraticCurveTo(31,-55,22,-78);ctx.closePath();ctx.fill();
 capsule(-20,-68,-34+armSwing*.35,-38,6,isGirl?"#eef6ff":"#d7a648",isGirl?"#a9c2d6":"#8e5a25");
 capsule(20,-68,34-armSwing*.35,-38,6,isGirl?"#eef6ff":"#d7a648",isGirl?"#a9c2d6":"#8e5a25");
 ctx.fillStyle="#f0c8aa";ctx.beginPath();ctx.arc(-34+armSwing*.35,-36,7,0,7);ctx.fill();ctx.beginPath();ctx.arc(34-armSwing*.35,-36,7,0,7);ctx.fill();
 ctx.shadowBlur=0;
 ctx.save();ctx.beginPath();ctx.ellipse(0,-104,29,36,0,0,7);ctx.clip();face(isGirl?girlImg:manImg,-31,-142,62,78);ctx.restore();
 ctx.strokeStyle="rgba(255,255,255,.35)";ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(0,-104,29,36,0,0,7);ctx.stroke();
 ctx.restore();
 ctx.save();ctx.globalAlpha=.24;ctx.fillStyle="#000";ctx.beginPath();ctx.ellipse(sx,ground+6,28,8,0,0,7);ctx.fill();ctx.restore();
}
function draw(){
 ctx.save();ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
 var sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,"#61baf2");sky.addColorStop(.58,"#e9f6ff");sky.addColorStop(1,"#7fbf8c");ctx.fillStyle=sky;ctx.fillRect(-10,-10,W+20,H+20);
 ctx.fillStyle="rgba(255,244,190,.75)";ctx.beginPath();ctx.arc(W*.82,72,34,0,7);ctx.fill();
 for(var l=0;l<3;l++){ctx.fillStyle=["#829ca6","#527973","#2f5d53"][l];ctx.beginPath();ctx.moveTo(0,H);var base=ground-145+l*58;for(var x=-180;x<W+220;x+=180){var wx=x+camera*(.13+l*.10),peak=base-88-(Math.sin(wx*.004+l)*54);ctx.lineTo(x,base);ctx.lineTo(x+90,peak);ctx.lineTo(x+180,base)}ctx.lineTo(W,H);ctx.fill()}
 for(var i=0;i<plats.length;i++){var p=plats[i],px=p[0]-camera,py=ground-p[2];if(px+p[1]<-40||px>W+40)continue;var rock=ctx.createLinearGradient(px,py,px+p[1],py+130);rock.addColorStop(0,"#71503a");rock.addColorStop(.55,"#4b3529");rock.addColorStop(1,"#2d241e");ctx.fillStyle=rock;ctx.fillRect(px,py,p[1],H-py);var grass=ctx.createLinearGradient(0,py-18,0,py+8);grass.addColorStop(0,"#7fe06d");grass.addColorStop(1,"#2d8945");ctx.fillStyle=grass;ctx.fillRect(px,py-18,p[1],22);ctx.fillStyle="rgba(255,255,255,.10)";for(var r=18;r<p[1];r+=50)ctx.fillRect(px+r,py+28+(r%3)*13,8,3)}
 for(var s=0;s<starX.length;s++)if(!taken[s]){var xx=starX[s]-camera,yy=ground-hAt(starX[s])-72;if(xx>-40&&xx<W+40){ctx.save();ctx.translate(xx,yy);ctx.rotate(Date.now()/500+s);ctx.shadowColor="#ffd84a";ctx.shadowBlur=18;ctx.fillStyle="#ffd84a";ctx.beginPath();for(var k=0;k<10;k++){var a=-Math.PI/2+k*Math.PI/5,rr=k%2?7:17;ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}ctx.closePath();ctx.fill();ctx.restore()}}
 body(chaser,false);body(player,true);
 for(var q=0;q<particles.length;q++){var pt=particles[q];ctx.globalAlpha=pt.life;ctx.fillStyle=pt.color;ctx.fillRect(pt.x-camera,ground-pt.y,5,5)}ctx.globalAlpha=1;
 var gx=7700-camera;if(gx>-100&&gx<W+100){var pg=ctx.createLinearGradient(gx-20,0,gx+100,0);pg.addColorStop(0,"rgba(124,70,255,0)");pg.addColorStop(.5,"rgba(124,70,255,.65)");pg.addColorStop(1,"rgba(124,70,255,0)");ctx.fillStyle=pg;ctx.fillRect(gx-30,ground-180,140,180);ctx.strokeStyle="#c9a8ff";ctx.lineWidth=6;ctx.beginPath();ctx.ellipse(gx+35,ground-85,40,82,0,0,7);ctx.stroke()}
 ctx.restore();
}
function loop(){var now=Date.now(),dt=Math.min(2,(now-last)/16.67||1);last=now;update(dt);draw();requestAnimationFrame(loop)}loop();
})();
</script>
</body>
</html>
